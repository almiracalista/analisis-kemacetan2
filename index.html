<h1>Analisis kemacetan</h1>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Rute Bebas Macet</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #map { height: 500px; width: 100%; margin-top: 20px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #357ae8; }
        #info { margin-top: 10px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>Aplikasi Pendeteksi Lokasi & Pencari Rute</h2>
    
    <div class="controls">
        <input type="text" id="destination" placeholder="Masukkan lokasi tujuan...">
        <button onclick="findRoute()">Cari Rute</button>
    </div>
    
    <div id="info">Menunggu deteksi lokasi...</div>
    <div id="map"></div>

    <!-- Ganti 'YOUR_API_KEY' dengan API Key Google Maps Anda -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

    <script>
        let map, directionsService, directionsRenderer, trafficLayer;
        let currentLocation = null;

        function initMap() {
            // Inisialisasi Peta
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: { lat: -6.200000, lng: 106.816666 }, // Default ke Jakarta
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
            
            // Tambahkan layer lalu lintas (warna merah = macet, hijau = lancar)
            trafficLayer = new google.maps.TrafficLayer();
            trafficLayer.setMap(map);

            // Coba deteksi lokasi pengguna
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                        };
                        map.setCenter(currentLocation);
                        map.setZoom(15);
                        document.getElementById("info").innerText = "Lokasi Anda berhasil dideteksi!";
                        
                        // Tandai lokasi kita di peta
                        new google.maps.Marker({
                            position: currentLocation,
                            map: map,
                            title: "Lokasi Anda"
                        });
                    },
                    () => {
                        document.getElementById("info").innerText = "Gagal mendeteksi lokasi. Pastikan GPS/Location aktif.";
                    }
                );
            } else {
                document.getElementById("info").innerText = "Browser Anda tidak mendukung deteksi lokasi.";
            }

            // Autocomplete untuk input tujuan
            let input = document.getElementById("destination");
            let autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.bindTo("bounds", map);
        }

        function findRoute() {
            let destination = document.getElementById("destination").value;

            if (!currentLocation) {
                alert("Lokasi Anda belum dideteksi. Harap tunggu atau izinkan akses lokasi.");
                return;
            }
            if (!destination) {
                alert("Harap masukkan lokasi tujuan.");
                return;
            }

            let request = {
                origin: currentLocation,
                destination: destination,
                travelMode: google.maps.TravelMode.DRIVING,
                provideRouteAlternatives: true, // Meminta rute alternatif
                drivingOptions: {
                    departureTime: new Date(),  // Menghitung prediksi lalu lintas saat ini
                    trafficModel: 'bestguess'
                }
            };

            directionsService.route(request, (result, status) => {
                if (status == google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                    
                    let routes = result.routes;
                    document.getElementById("info").innerText = `Ditemukan ${routes.length} rute alternatif. Rute terbaik/tercepat ditampilkan otomatis.`;
                } else {
                    document.getElementById("info").innerText = "Rute tidak ditemukan: " + status;
                }
            });
        }

        // Panggil initMap setelah halaman dimuat
        window.onload = initMap;
    </script>
</body>
</html>
